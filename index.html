    options: ["5 years", "18 months", "6 months", "10 years"],
    answer: 1,
    explanation: "Moore's Law, observed by Intel co-founder Gordon Moore, states transistors double roughly every 18 months — making chips more powerful and cheaper over time."
  },
  {
    q: "A computer is experiencing a delay when sending data to a cloud server and receiving a response. What term best describes this delay?",
    options: ["Bandwidth", "Parallelism", "Latency", "Throughput"],
    answer: 2,
    explanation: "Latency is the delay between initiating a request and receiving a response — especially relevant when offloading tasks to the cloud, which involves an internet round trip."
  },
  {
    q: "Nvidia's GPUs became essential for AI because they were originally designed with a highly parallel architecture. What is the general term for chips designed for one specific task?",
    options: ["CPUs", "ASICs", "RAM", "Semiconductors"],
    answer: 1,
    explanation: "ASICs (Application-Specific Integrated Circuits) are chips designed for a single specific purpose. Nvidia's GPUs, originally built for graphics, turned out to be ideal for AI due to their massively parallel design."
  },
  {
    q: "A company built all of its software on a specific operating system. Now switching to a different OS would require retraining all staff, converting thousands of files, and rebuilding workflows. This is best described as:",
    options: ["Price Elasticity", "Parallelism", "Lock-in / Switching Costs", "Vertical Integration"],
    answer: 2,
    explanation: "Lock-in (switching costs) refers to the financial, operational, and strategic barriers that make it difficult to leave a technology platform — exactly what Konana's Software Ecosystem model predicts."
  },
  {
    q: "Your ISP advertises a 200 Mbps internet plan. What is your actual maximum download speed in Megabytes per second (MB/s)?",
    options: ["200 MB/s", "25 MB/s", "1,600 MB/s", "8 MB/s"],
    answer: 1,
    explanation: "Because 8 bits = 1 byte, you divide Mbps by 8 to get MB/s. 200 Mbps ÷ 8 = 25 MB/s. ISPs advertise in bits, but files are measured in bytes — so your speed always looks 8x smaller than advertised."
  }
];

// ══════════════════════════════════════════════
//  BUILD VOCAB
// ══════════════════════════════════════════════
function buildVocab(list) {
  const grid = document.getElementById('vocabGrid');
  grid.innerHTML = '';
  if (list.length === 0) {
    grid.innerHTML = '<p style="color:#8A6640;text-align:center;padding:2rem;">No terms match your search.</p>';
    return;
  }
  list.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = 'vocab-card';
    card.style.animationDelay = `${i * 0.04}s`;
    card.innerHTML = `
      <div class="card-header">
        <span class="card-num">${String(i+1).padStart(2,'0')}</span>
        <h2>${t.term}</h2>
        <span class="tag" style="margin-left:auto">${t.tag}</span>
      </div>
      <div class="card-body">
        <div class="def-block">
          <span class="def-label">Exact Definition</span>
          <p class="def-text">${t.exact}</p>
        </div>
        <div class="def-block">
          <span class="def-label">Simple Definition</span>
          <p class="def-text">${t.simple}</p>
        </div>
        <div class="example-block">
          <span class="def-label">Example</span>
          <p class="def-text">${t.example}</p>
        </div>
      </div>`;
    grid.appendChild(card);
  });
}

function filterCards() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = terms.filter(t =>
    t.term.toLowerCase().includes(q) ||
    t.exact.toLowerCase().includes(q) ||
    t.simple.toLowerCase().includes(q) ||
    t.tag.toLowerCase().includes(q)
  );
  buildVocab(filtered);
}

// ══════════════════════════════════════════════
//  BUILD QUIZ
// ══════════════════════════════════════════════
let score = 0;
let answered = new Array(questions.length).fill(false);

function buildQuiz() {
  const wrap = document.getElementById('quizWrap');
  wrap.innerHTML = '';
  questions.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `q${qi}`;
    card.style.animationDelay = `${qi * 0.08}s`;
    const opts = q.options.map((o, oi) =>
      `<button class="option-btn" onclick="checkAnswer(${qi},${oi})">${o}</button>`
    ).join('');
    card.innerHTML = `
      <div class="q-header">
        <div class="q-num">${qi+1}</div>
        <p>${q.q}</p>
      </div>
      <div class="q-options">${opts}</div>
      <div class="feedback" id="fb${qi}"></div>`;
    wrap.appendChild(card);
  });
  updateScore();
}

function checkAnswer(qi, chosen) {
  if (answered[qi]) return;
  answered[qi] = true;
  const q = questions[qi];
  const card = document.getElementById(`q${qi}`);
  const btns = card.querySelectorAll('.option-btn');
  const fb = document.getElementById(`fb${qi}`);
  btns.forEach(b => b.disabled = true);
  btns[q.answer].classList.add('correct');
  if (chosen === q.answer) {
    score++;
    fb.textContent = '✅ Correct! ' + q.explanation;
    fb.className = 'feedback show correct-fb';
  } else {
    btns[chosen].classList.add('wrong');
    fb.textContent = '❌ Not quite. ' + q.explanation;
    fb.className = 'feedback show wrong-fb';
  }
  updateScore();
}

function updateScore() {
  const total = answered.filter(Boolean).length;
  document.getElementById('scoreDisplay').textContent = `${score}/${questions.length}`;
  document.getElementById('progressFill').style.width = `${(total / questions.length) * 100}%`;
}

function resetQuiz() {
  score = 0;
  answered = new Array(questions.length).fill(false);
  buildQuiz();
}

// ══════════════════════════════════════════════
//  TABS
// ══════════════════════════════════════════════
function showTab(id, btn) {
  document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

// ── INIT ──
buildVocab(terms);
buildQuiz();
</script>
